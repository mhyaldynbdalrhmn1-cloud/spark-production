<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stark Production | اتصل بنا</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="main-header">
        <div class="container header-container">
            <div class="logo">Stark Production</div>
            <button class="menu-toggle" id="mobile-menu"><span></span><span></span><span></span></button>
            <nav class="main-nav" id="nav-menu">
                <ul>
                    <li><a href="index.html">الرئيسية</a></li>
                    <li><a href="products.html">المنتجات</a></li>
                    <li><a href="services.html">خدماتنا</a></li>
                    <li><a href="about.html">من نحن</a></li>
                    <li><a href="contact.html" class="active">اتصل بنا</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        <h1 class="page-title">يسعدنا تواصلك</h1>
        <div class="contact-container">
            <div class="contact-form">
                <form action="#">
                    <div class="form-group">
                        <label>الاسم بالكامل</label>
                        <input type="text" required placeholder="أدخل اسمك الكريم">
                    </div>
                    <div class="form-group">
                        <label>البريد الإلكتروني</label>
                        <input type="email" required placeholder="example@mail.com">
                    </div>
                    <div class="form-group">
                        <label>رسالتك</label>
                        <textarea rows="5" required placeholder="اكتب تفاصيل استفسارك هنا..."></textarea>
                    </div>
                    <button type="submit" class="btn-submit">إرسال الرسالة</button>
                </form>
            </div>
            <div class="contact-info">
                <h3>معلومات التواصل المباشر</h3>
                <p>📍 الإسكندرية، مصر</p>
                <p>📞 <span style="direction: ltr; display: inline-block;">01092967490</span></p> 
                <p>✉️ support@smartstore.com</p>
            </div>
        </div>
    </main>

    <footer class="main-footer"><p>&copy; 2026 جميع الحقوق محفوظة | Stark Production</p></footer>
    <script src="main.js"></script>
</body>
</html>
